<div class="container" style="    margin-top: 7%;">
    <div class="row">
      <div class="col-md-12">
  <!-- Add User Button -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button class="btn btn-warning" (click)="goBack()" style="color: white;">
      <i class="fas fa-arrow-left"></i>
    </button>
    <h3 style="font-weight: bold;margin-left: -63%;">Question Details</h3>
    <div>
     
      <button class="btn btn-success me-2" style="background-color: #0a48b3" (click)="openModal()">
        <i class="fas fa-plus-circle"></i> Add Question Paper
      </button>
    </div>
  </div>
  
        <!-- Loading Spinner (only show when loading) -->
        <div *ngIf="isLoading" class="spinner-overlay">
          <div class="spinner"></div>
        </div>
      <!-- Search Box and Show Entries -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <!-- Show entries -->
        <div>
          <label for="entriesPerPage">Show entries</label>
          <select id="entriesPerPage" class="form-control" [(ngModel)]="entriesPerPage" (change)="applyFilters()">
            >
            <option *ngFor="let option of entriesOptions" [value]="option">{{ option }}</option>
          </select>
        </div>
        <!-- Search box -->
        <div>
          <input
          type="text"
          class="form-control"
          placeholder="Search questions..."
          [(ngModel)]="searchText"
          (input)="applyFilters()"
        />
                </div>
      </div>
       <div class="table-container" style="max-height: 500px; overflow-y: auto; border: 1px solid #ddd;">
       
        <table class="table table-hover table-striped custom-table">
          <thead>
            <tr class="text-start">
              <th class="text-start">SR. No</th>
              <th class="text-start">Question Name</th>
              <th class="text-start">Category</th>
              
              <th class="text-start">Action</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="questions.length === 0">
              <td colspan="3" class="text-center">No data available</td>
            </tr>
            <tr *ngFor="let question of questions; let i = index">
              <td class="text-start">{{ (p - 1) * entriesPerPage + (i + 1) }}</td>
              <td class="text-start">{{ question.QuestionName }}</td>
              <td class="text-start">{{ question.Category }}</td> 
              
              <td class="text-start">
                <button class="edit-btn" (click)="editQuestion(question)" style="background: green; color: white; border: none;">
                  <i class="fa fa-edit"></i>
                </button> &nbsp;
                <button class="delete-btn" style="background: rgb(224, 33, 33); border: none; color: white;" (click)="deleteQuestions(question)">
                  <i class="fa fa-trash" style="font-size: 18px;"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        
      
       
        
      </div>
      
    <!-- Pagination Controls -->
    <div class="d-flex justify-content-between align-items-center">
      <div class="pagination-controls" style="margin: 7px;">
        <button (click)="onPageChange(p - 1)" [disabled]="p === 1" class="btn btn-primary" style="background-color: #0a48b3;">Previous</button>
       {{ p }} 
        <button (click)="onPageChange(p + 1)" [disabled]="p === totalPages" class="btn btn-primary" style="background-color: #0a48b3 ;">Next</button>
      </div>
      
      <div class="text-right">
        <span>Showing {{ rangeInfo.start }} to {{ rangeInfo.end }} of {{ rangeInfo.total }} entries</span>
      </div>
    </div>
    
     
<!-- Main Course Modal -->
<div *ngIf="isModalOpen" class="modal">
  <div class="modal-content">
    <button class="close-btn" (click)="closeModal()">&times;</button>
    <h3 class="modal-header">{{ modalHeaderText }}</h3>
    <form>
      <div class="row">
        <div class="col-md-6">
          <label for="questionName" style="font-weight: bold;">Question Name</label>
          <input class="form-control" type="text" id="questionName" [(ngModel)]="questionName" name="questionName" placeholder="Enter the question here" required />
        </div>
        <div class="col-md-6">
          <label for="category" style="font-weight: bold;">Category</label>
          <input class="form-control" type="text" id="categoryName" [(ngModel)]="categoryName" name="categoryName" placeholder="Enter question category" required />
        </div>
      </div>

      <div class="row mt-2">
        <div class="col-md-4">
          <label for="responseType" style="font-weight: bold;">Response Type</label>
          <input class="form-control" type="text" id="responseType" [(ngModel)]="responseType" name="responseType" placeholder="e.g., multiple_choice" required />
        </div>
        <div class="col-md-4">
          <label for="ansCount" style="font-weight: bold;">Answer Count</label>
          <input class="form-control" type="number" id="ansCount" [(ngModel)]="ansCount" name="ansCount" placeholder="Total answer options" required />
        </div>
        <div class="col-md-4">
          <label for="ansCorrect" style="font-weight: bold;">Correct Answer</label>
          <input class="form-control" type="text" id="ansCorrect" [(ngModel)]="ansCorrect" name="ansCorrect" placeholder="e.g., ans_b" required />
        </div>
      </div>

      <div class="row mt-2">
        
        <div class="col-md-4">
          <label for="ansA" style="font-weight: bold;">Answer A</label>
          <input class="form-control" type="text" id="ansA" [(ngModel)]="ansA" name="ansA" placeholder="Enter option A" />
        </div>
        <div class="col-md-4">
          <label for="ansB" style="font-weight: bold;">Answer B</label>
          <input class="form-control" type="text" id="ansB" [(ngModel)]="ansB" name="ansB" placeholder="Enter option B" />
        </div>
        <div class="col-md-4">
          <label for="ansC" style="font-weight: bold;">Answer C</label>
          <input class="form-control" type="text" id="ansC" [(ngModel)]="ansC" name="ansC" placeholder="Enter option C" />
        </div>
      </div>

      
      <div class="row mt-2">
        <div class="col-md-4">
          <label for="ansD" style="font-weight: bold;">Answer D</label>
          <input class="form-control" type="text" id="ansD" [(ngModel)]="ansD" name="ansD" placeholder="Enter option D" />
        </div>
        <div class="col-md-4">
          <label for="ansE" style="font-weight: bold;">Answer E</label>
          <input class="form-control" type="text" id="ansE" [(ngModel)]="ansE" name="ansE" placeholder="Enter option E" />
        </div>
        <div class="col-md-4">
          <label for="ansF" style="font-weight: bold;">Answer F</label>
          <input class="form-control" type="text" id="ansF" [(ngModel)]="ansF" name="ansF" placeholder="Enter option F"  />
        </div>
      </div>

      <div class="row mt-2">
        
        <div class="col-md-4">
          <label for="questionTags" style="font-weight: bold;">Question Tags</label>
          <input class="form-control" type="text" id="questionTags" [(ngModel)]="questionTags" name="questionTags"  placeholder="Enter option Question Tags" />
        </div>
        <div class="col-md-4">
          <label for="difficulty" style="font-weight: bold;">Difficulty</label>
          <input class="form-control" type="text" id="difficulty" [(ngModel)]="difficulty" name="difficulty"  placeholder="Enter enter difficulty"/>
        </div>
        <div class="col-md-4">
          <label for="explanation" style="font-weight: bold;">Explanation</label>
          <textarea class="form-control" id="explanation" [(ngModel)]="explanation" name="explanation" rows="3" placeholder="Enter Explanation"
          ></textarea>
        </div>
      </div>


      <div class="row mt-3">
        <div class="col-md-12">
          <button class="btnSubmit" type="button" (click)="saveQuestionDetails()" style="float: inline-end;">Save</button>
        </div>
      </div>
    </form>
  </div>
</div>

  
    </div>
  </div>
