<div class="container" style="margin-top: -3%;">
  <div class="row align-items-center shadow-lg rounded" style="overflow: hidden; gap: 20px; padding: 5%;">
    <div class="col-md-5 d-flex justify-content-center p-0">
      <img src="../../assets/Images/login.svg" alt="Learning Portal" class="img-fluid rounded" style="height: 100%; object-fit: cover; width: 100%;">
    </div>
    <div class="col-md-6 p-5 bg-light animated-card">
      <div class="text-center mb-4">
        <h1 class="text-primary display-4">{{Header.Header}}</h1>
        <h4 class="text-muted">{{Header.SubHeader}}</h4>
      </div>
      <form (ngSubmit)="onLogin($event)">
        <div class="form-group mb-4">
          <label for="username" class="form-label">{{labels.txt_Employee}}</label>
          <input #employeeCodeInput type="text" class="form-control shadow-sm" id="username" name="username" 
                 placeholder="{{PlaceHolder.ph_EmpID}}" [(ngModel)]="employeeCode" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">{{labels.txt_Password}}</label>
          <input #passwordInput type="password" class="form-control shadow-sm" id="password" name="password" 
                 placeholder="{{PlaceHolder.ph_password}}" [(ngModel)]="password" required>
        </div>
        
        <!-- CAPTCHA UI -->
        <div style="background: url('../../assets/Images/bg4.jpg') center center no-repeat; margin: 43px; background-size: cover; border-block: ridge">
          <span id="captcha" class="d-flex justify-content-center align-items-center"></span>
        </div>
        <input #captchaCodeInput type="text" class="input form-control"  
               placeholder="{{PlaceHolder.ph_Captcha}}" id="cpatchaTextBox" autocomplete="off" required />

        <div class="forgot-password">
          <a (click)="onForgot($event)" class="text-primary" style="cursor: pointer;">{{Link.link_forget}}</a>
        </div>
        <button type="submit" class="btn btn-primary w-100 login-btn mt-1">{{Button.LoginButton}}</button>
      </form>
    </div>
  </div>
</div>
