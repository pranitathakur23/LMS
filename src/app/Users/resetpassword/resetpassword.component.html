<div class="container mt-5">
  <div class="row align-items-center shadow-lg rounded" style="overflow: hidden; gap: 20px;padding: 5%;">
    <!-- Left Column for Image -->
    <div class="col-md-5 d-flex justify-content-center p-0">
      <img src="../../assets/Images/login.svg" alt="Learning Portal" class="img-fluid rounded" style="height: 100%; object-fit: cover; width: 100%;">
    </div>

    <!-- Right Column for Login Card -->
    <div class="col-md-6 p-5 bg-light animated-card">
      <div class="text-center mb-4">
        <!-- Back Arrow beside SkillMate -->
        <div class="d-flex align-items-center justify-content-center">
          <i class="bi bi-arrow-left-circle fs-3 text-primary me-2" role="button" (click)="navigateToForgotPassword()"></i>
          <h1 class="text-primary display-4 m-0">SkillMate</h1>
        </div>
        <h4 class="text-muted mt-3">Reset Your Password Here</h4>
      </div>

      <form>
        <!-- New Password Field -->
       <!-- New Password Field -->
<div class="form-group mb-4 position-relative">
  <label for="newpassword" class="form-label">New Password</label>
  <div class="d-flex align-items-center position-relative">
    <input [type]="showNewPassword ? 'text' : 'password'" class="form-control shadow-sm pe-5" id="newpassword"
           name="newpassword" placeholder="Enter Your New Password" required
           (input)="validatePassword()" [(ngModel)]="newPassword" #newPasswordInput>

    <!-- Info Icon for New Password -->
    <span class="ms-2 position-relative" (mouseenter)="toggleTooltip('new', true)" (mouseleave)="toggleTooltip('new', false)">
      <i class="bi bi-info-circle text-primary"></i>
      <div *ngIf="showNewPasswordTooltip" class="tooltip-box">
        <ul class="list-unstyled m-0">
          <li [class.text-success]="passwordValidations.length">At least 8 characters</li>
          <li [class.text-success]="passwordValidations.uppercase">One uppercase letter</li>
          <li [class.text-success]="passwordValidations.lowercase">One lowercase letter</li>
          <li [class.text-success]="passwordValidations.number">One number</li>
          <li [class.text-success]="passwordValidations.specialChar">One special character</li>
        </ul>
      </div>
    </span>
  </div>
</div>
      
   <!-- Confirm Password Field -->
<div class="form-group mb-4 position-relative">
  <label for="confirmpassword" class="form-label">Confirm Password</label>
  <div class="d-flex align-items-center position-relative">
    <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control shadow-sm pe-5" id="confirmpassword"
           name="confirmpassword" placeholder="Confirm Your New Password" required
           [(ngModel)]="confirmPassword" #confirmPasswordInput>

    <!-- Info Icon for Confirm Password -->
    <span class="ms-2 position-relative" (mouseenter)="toggleTooltip('confirm', true)" (mouseleave)="toggleTooltip('confirm', false)">
      <i class="bi bi-info-circle text-primary"></i>
      <div *ngIf="showConfirmPasswordTooltip" class="tooltip-box">
        <ul class="list-unstyled m-0">
          <li [class.text-success]="passwordValidations.length">At least 8 characters</li>
          <li [class.text-success]="passwordValidations.uppercase">One uppercase letter</li>
          <li [class.text-success]="passwordValidations.lowercase">One lowercase letter</li>
          <li [class.text-success]="passwordValidations.number">One number</li>
          <li [class.text-success]="passwordValidations.specialChar">One special character</li>
        </ul>
      </div>
    </span>
  </div>
</div>
      
    

        <button class="btn btn-primary w-100 login-btn mt-4" (click)="resetPassword()">
          Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
