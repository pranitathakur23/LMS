<h2 class="text-center" style="margin-left: -78%;">Course Mapping</h2>

<div class="container mt-4">
  <!-- Page Header -->

  <!-- Form with Dropdowns and Buttons -->
  <form (ngSubmit)="onSubmit()">
    <div class="row mb-3">
      <!-- Bank Dropdown -->
      <div class="col-md-3">
        <label for="bank">Bank</label>
        <select id="bank" class="form-select custom-dropdown" [(ngModel)]="formData.bank" 
        name="bank" required 
        >
          <option value="" style="height: 50px;">Select Bank</option>
          <option *ngFor="let bank of banks" [value]="bank" style="height: 50px;">{{ bank }}</option>
        </select>
      </div>
      <!-- State Dropdown -->
      <div class="col-md-3">
        <label for="state">State</label>
        <select id="state" class="form-select" [(ngModel)]="formData.state" name="state" 
        required  
         >
          <option value="">Select State</option>
          <option *ngFor="let state of states" [value]="state">{{ state }}</option>
        </select>
      </div>
      <!-- Area Dropdown -->
      <div class="col-md-3">
        <label for="area">Area</label>
        <select id="area" class="form-select" [(ngModel)]="formData.area" name="area" required>
          <option value="">Select Area</option>
          <option *ngFor="let area of areas" [value]="area">{{ area }}</option>
        </select>
      </div>
      
      <!-- Branch Dropdown -->
      <div class="col-md-3">
        <label for="branch">Branch</label>
        <select id="branch" class="form-select" [(ngModel)]="formData.branch" name="branch" required>
          <option value="">Select Branch</option>
          <option *ngFor="let branch of branches" [value]="branch">{{ branch }}</option>
        </select>
      </div>
    </div>

    <div class="row">
      <!-- Designation Dropdown -->
      <div class="col-md-3">
        <label for="designation">Designation</label>
        <select id="designation" class="form-select" [(ngModel)]="formData.designation" name="designation" required>
          <option value="">Select Designation</option>
          <option *ngFor="let designation of designations" [value]="designation">{{ designation }}</option>
        </select>
      </div>

      <!-- Date Picker -->
      <div class="col-md-3">
        <label for="date">Date</label>
        <input type="date" id="date" class="form-control" [(ngModel)]="formData.date" name="date" required>
      </div>

      <!-- Search Button -->
      <div class="col-md-1 mt-4">
        <button type="submit" class="btn btn-primary">Search</button>
      </div>

      <!-- Allocate Button -->
      <div class="col-md-1 mt-4">
        <button type="button" class="btn btn-success" (click)="openModal()">Allocate</button>
      </div>
    </div>
  </form>

  <!-- Static Table with Gradient Background -->
  <div class="table-responsive mt-4">
    <table class="table">
      <thead style="background-color: #0a48b3 !important; color: white;">
        <tr>
          <th>
            <input type="checkbox" id="selectAll" [checked]="selectAll" (change)="toggleSelectAll()" />
            Select All
          </th>
          <th>Employee Code</th>
          <th>Employee Name</th>
          <th>Bank</th>
          <th>State</th>
          <th>Area</th>
          <th>Branch</th>
          <th>Designation</th> <!-- Added Designation column -->
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let employee of employees">
          <td>
            <input type="checkbox" [(ngModel)]="employee.selected" />
          </td>
          <td>{{ employee.code }}</td>
          <td>{{ employee.name }}</td>
          <td>{{ employee.bank }}</td>
          <td>{{ employee.state }}</td>
          <td>{{ employee.area }}</td>
          <td>{{ employee.branch }}</td>
          <td>{{ employee.designation }}</td> <!-- Displaying Designation -->
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal for Allocation -->
<div *ngIf="isModalOpen" class="modal">
  <div class="modal-content">
    <span class="close-btn" (click)="closeModal()">&times;</span>
    <h4 class="text-center">Allocate Course</h4>
    <form (ngSubmit)="saveAllocation()">
      <!-- Allocate From Date -->
      <div class="form-group mb-3">
        <label for="allocateFrom">Allocate From</label>
        <input type="date" id="allocateFrom" class="form-control" [(ngModel)]="allocateFormData.allocateFrom" name="allocateFrom" required>
      </div>

      <!-- Allocate To Date -->
      <div class="form-group mb-3">
        <label for="allocateTo">Allocate To</label>
        <input type="date" id="allocateTo" class="form-control" [(ngModel)]="allocateFormData.allocateTo" name="allocateTo" required>
      </div>

      <div class="text-center">
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>
