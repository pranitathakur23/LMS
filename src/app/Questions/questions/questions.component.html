      <!-- Main Course Modal -->
      <div  class="modal">
        <div class=" modal-content">
          <button class="close-btn" >&times;</button>
          <h3 class="modal-header"></h3>
          <form>
            <!-- Course Form Fields -->
            <div class="row">
              <div class="col-md-6">
                <label for="questionTitle" style="font-weight: bold;">
                  Question Title
                </label>
                <input class="form-control" type="text" id="questionTitle" 
                  placeholder="Enter Course Title" name="questionTitle" required #questionTitleSelect />
              </div>
              <div class="col-md-6">
                <label for="uploadExcel" style="font-weight: bold;">
                  Question Upload Excel
                </label>
                <input class="form-control" type="file" id="uploadExcel" placeholder="select Excel file"
                  name="uploadExcel" required />
              </div>
            </div>
            <div class="row mt-3">
              <div class="col-md-12">
                <button class="btnSubmit" >
                  Submit
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
