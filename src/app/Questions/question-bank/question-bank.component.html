<div class="container" style="    margin-top: 7%;">
  <div class="row">
    <div class="col-md-12">
<!-- Add User Button -->
<div class="d-flex justify-content-between align-items-center mb-4">
 
  <h3 style="font-weight: bold;">Question Paper</h3>
  <div>

    <button class="btn btn-primary" (click)="downloadExcel()" style="background-color: #198754">
      <i class="fas fa-file-excel"></i> {{Button.TemplateButton}}
    </button>&nbsp;
    <button class="btn btn-success me-2" style="background-color: #0a48b3" (click)="openModal()">
      <i class="fas fa-plus-circle"></i> {{Button.QuestionButton}}
    </button>
  </div>
</div>

      <!-- Loading Spinner (only show when loading) -->
      <div *ngIf="isLoading" class="spinner-overlay">
        <div class="spinner"></div>
      </div>
          <!-- User List Table -->
     <!-- User List Table -->
<div class="table-container">
  <table class="table table-hover table-striped custom-table">
    <thead>
      <tr>
          <th>{{table.tbl_SRNo}}</th>
            <th>{{table.tbl_Question}}</th>
            <th>Edit</th> <!-- Changed the header to "Action" -->
            <th>Delete</th>
            <th> Questions</th>
      </tr>
    </thead>
    <tbody>
       <!-- Check if courses are available, else display no data message -->
  <tr *ngIf="questions.length === 0">
    <td colspan="3" class="text-center">{{labels.txt_Nodata}}</td> <!-- Adjust colspan to match the number of columns -->
  </tr>
      <tr *ngFor="let question of questions; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ question.questionTitle}}</td>
            <td> <button class="edit-btn" style="background: green; border: none; color: white;" (click)="editQuestions(question)">
              <i class="fa fa-edit" style="font-size: 18px;"></i>
            </button></td>
            <td> <!-- Combined the Edit and Delete buttons into a single column -->
              <button class="delete-btn" style="background: rgb(224, 33, 33); border: none; color: white;" (click)="deleteQuestions(question)">
                <i class="fa fa-trash" style="font-size: 18px;"></i>
              </button>
             
              
              
              <!-- <button class="edit-btn" style="background: green; border: none; color: white;" (click)="questionpage()">
                <i class="fa fa-edit" style="font-size: 18px;"></i>
              </button> -->
            </td>
            <td>
              <button class="add-btn"
              style="background: #0a48b3; border: none; color: white;"
              (click)="addQuestion(question.questionTitle)">
        <i class="fa fa-plus" style="font-size: 18px;"></i>
      </button>
            </td>
          </tr>
    </tbody>
  </table>
</div>

    <!-- Main Course Modal -->
    <div *ngIf="isModalOpen" class="modal">
      <div class=" modal-content">
        <button class="close-btn" (click)="closeModal()">&times;</button>
        <h3 class="modal-header">{{ modalHeaderText }}</h3>
        <form>
          <!-- Course Form Fields -->
          <div class="row">
            <div class="col-md-6">
              <label for="questionTitle" style="font-weight: bold;">
                {{labels.txt_QuestionTitle}}
              </label>
              <input class="form-control" type="text" id="questionTitle" [(ngModel)]="selectedQuestionCategory"
                placeholder="Enter Course Title" name="questionTitle" required #questionTitleSelect />
            </div>
            <div class="col-md-6">
              <label for="uploadExcel" style="font-weight: bold;">
               {{labels.txt_QuesExcel}}
              </label>
              <input class="form-control" type="file" id="uploadExcel" placeholder="select Excel file"
                name="uploadExcel" required />
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-md-12">
              <button class="btnSubmit" (click)="SaveandUpdateQuestionDetails()">
                {{Button.submitButton}}
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
