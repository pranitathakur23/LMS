<div class="container" style="    margin-top: 7%;">
  <div class="row">
    <div class="col-md-12">
      <!-- Add User Button -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <button class="btn btn-warning" (click)="goBack()" style="color: white;">
          <i class="fas fa-arrow-left" ></i> 
        </button>
        <h3 style="font-weight: bold;margin-left: -56%;">Question Details</h3>
        <button class="btn btn-success" (click)="openModal()">
          <i class="fas fa-plus-circle"></i>  Add Questions 
        </button>
      </div>

          <!-- User List Table -->
     <!-- User List Table -->
<div class="table-container">
  <table class="table table-hover table-striped custom-table">
    <thead>
      <tr>
          <th>SR. No</th>
            <th>Question Paper Name</th>
            <th>Action</th> <!-- Changed the header to "Action" -->

      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let question of questions; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ question.questionTitle}}</td>
            <td> <!-- Combined the Edit and Delete buttons into a single column -->
              <button class="edit-btn" style="background: green; border: none; color: white;" (click)="editQuestions(question)">
                <i class="fa fa-edit" style="font-size: 18px;"></i>
              </button> &nbsp;
              <button class="delete-btn" style="background: rgb(224, 33, 33); border: none; color: white;" (click)="deleteQuestions(question)">
                <i class="fa fa-trash" style="font-size: 18px;"></i>
              </button>
            </td>
          </tr>
    </tbody>
  </table>
</div>

    <!-- Main Course Modal -->
    <div *ngIf="isModalOpen" class="modal">
      <div class=" modal-content">
        <button class="close-btn" (click)="closeModal()">&times;</button>
        <h3 class="modal-header">{{ modalHeaderText }}</h3>
        <form>
          <!-- Course Form Fields -->
          <div class="row">
            <div class="col-md-6">
              <label for="questionTitle" style="font-weight: bold;">
                Question Title
              </label>
              <input class="form-control" type="text" id="questionTitle" [(ngModel)]="selectedQuestionCategory"
                placeholder="Enter Course Title" name="questionTitle" required #questionTitleSelect />
            </div>
            <div class="col-md-6">
              <label for="uploadExcel" style="font-weight: bold;">
                Question Upload Excel
              </label>
              <input class="form-control" type="file" id="uploadExcel" placeholder="select Excel file"
                name="uploadExcel" required />
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-md-12">
              <button class="btnSubmit" (click)="SaveandUpdateQuestionDetails()">
                Submit
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
