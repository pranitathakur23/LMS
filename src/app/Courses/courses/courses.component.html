<div class="container" style="    margin-top: 7%;">
  <div class="row">
    <div class="col-md-12">
      <!-- Add User Button -->
      <!-- Back Button -->
      <div class="d-flex justify-content-between align-items-center mb-4">

        <h3 class="mb-0" style="font-weight: bold;"> {{Header.CourseHeader}}</h3>
        <button class="btn btn-success" (click)="openModal()">
          <i class="fas fa-plus-circle"></i>{{Button.CourseButton}}
        </button>
      </div>
    </div>
    <!-- User List Table -->
     <div class="table-wrapper">
        <table class="table table-hover table-striped custom-table text-center align-middle table-wrapper">
      
        <thead>
          <tr>
            <th class="text-center">{{table.tbl_SRNo}}</th>
            <th class="text-start">{{table.tbl_MainCourseName}}</th>
            <th class="text-start">{{table.tbl_CourseName}}</th>
            <th>{{table.tbl_Edit}}</th>
            <th class="text-center">{{table.tbl_Mapping}}</th>
            <th>{{table.tbl_Delete}}</th>
          </tr>
        </thead>
        <tbody>
          <!-- Check if courses are available, else display no data message -->
          <tr *ngIf="courses.length === 0">
            <td colspan="6" class="text-center">No data available</td>
            <!-- Adjust colspan to match the number of columns -->
          </tr>
          <tr *ngFor="let course of courses; let i = index">
            <td class="text-center">{{ i + 1 }}</td>
            <td class="text-start">{{ course.maincoursename }}</td>
            <td class="text-start">{{ course.name }}</td>
            <td>
              <button class="btn btn-warning btn-sm mr-2" (click)="editCourse(course)" style="background-color: #198754;
            color: white;
            border-color: #198754;">
                <i class="fas fa-edit"></i>
              </button>


            </td>
            <td class="text-center">
              <button class="btn btn-info btn-sm mr-2" (click)="mapCourse(course.courseId, course.name)"
                style="background-color: #0dcaf0; border-color: #0dcaf0;">
                <i class="fas fa-exchange-alt"></i> <!-- Mapping icon -->
              </button>
            </td>

            <td><button class="btn btn-danger btn-sm mr-2" (click)="deleteCourse(course)" style=" background-color: #dc3545;
              border-color: #dc35">
                <i class="fas fa-trash-alt"></i>
              </button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<!--  Course Modal -->
<div *ngIf="isModalOpen" class="modal">
  <div class=" modal-content">
    <button class="close-btn" (click)="closeModal()">&times;</button>
    <!-- Modal Header -->
    <h3 class="modal-header">{{ modalHeader }}</h3>
    <form (ngSubmit)="submitForm()">
      <div class="row align-items-center">
        <div class="col-md-6">
          <label for="mainCourse" style="font-weight: bold;">
            Select Main Course
          </label>
          <ng-select class="form-control no-input-border" [items]="Maincourses" bindLabel="CourseName"
            bindValue="CourseID" [(ngModel)]="newCourse.MainCourseddl" placeholder="Select an option"  name="mainCourse">
          </ng-select>

        </div>
      
        <div class="col-md-6 d-flex align-items-end mt-4">
          <button type="button" [disabled]="selectedMainCourse"
            [ngClass]="{ 'disabled-button': newCourse.MainCourseddl }" class="btn btn-sm ml-2"
            style="background-color: #0a48b3; color: white;" (click)="openModalMainCourse()">
            <i class="fa fa-plus"></i>
          </button>
        </div>
      </div>
      <!-- Course Form Fields -->
      <div class="row">
        <div class="col-md-6">
          <label for="courseTitle" style="font-weight: bold;">
            Course Title
          </label>
          <input class="form-control" type="text" id="courseTitle" [(ngModel)]="newCourse.title"
            placeholder="Enter Course Title" name="courseTitle" required #courseTitleInput />
        </div>
        <div class="col-md-6">
          <label for="department" style="font-weight: bold;">
            Department
          </label>
          <select class="form-control" id="department" [(ngModel)]="newCourse.department" name="department" required
            #departmentSelect>
            <option value="" disabled selected>Select Department</option>
            <option *ngFor="let dept of departments" [value]="dept.DepartmentID">
              {{ dept.DepartmentName }}
            </option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="col-md-6">
          <label for="durationTime" style="font-weight: bold;">
            Course Duration In
          </label>
          <select class="form-control" id="durationTime" [(ngModel)]="newCourse.durationTime" name="durationTime"
            required #durationTimeSelect>
            <option value="" disabled selected>Select Course Duration</option>
            <option *ngFor="let time of durationTimes" [value]="time.DurationID">
              {{ time.DurationName }}
            </option>
          </select>
        </div>
        <div class="col-md-6">
          <label for="duration" style="font-weight: bold;">
            Course Duration
          </label>
          <input class="form-control" type="text" id="duration" [(ngModel)]="newCourse.duration" name="duration"
            placeholder="Enter Course Duration Time" required (input)="validateNumberInput($event)" />
        </div>
        <div class="col-md-6">
          <label for="fileUpload" style="font-weight: bold;">
            Thumbnail
          </label>
          <div class="custom-file">
            <input type="file" class="form-control" id="fileUpload" (change)="handleFileUpload($event)" accept="image/*"
              #fileUploadInput />
          </div>
        </div>
        <div class="col-md-6">
          <label for="description" style="font-weight: bold;">
            Description
          </label>
          <textarea class="form-control" id="description" name="description" rows="4"
            [(ngModel)]="newCourse.description" required #descriptionTextarea></textarea>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-12">
          <button class="create-btn"
            style="background-color: #218838; color: white; border: none; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; color: white; transition: background-color 0.3s ease;">
            Submit
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
<!-- Main Course Modal -->
<div *ngIf="isMainCourseModal" class="add-maincourse-modal">
  <div class="add-maincourse-modal-content">
    <button class="add-maincourse-close-btn" (click)="closeModalMainCourse()">&times;</button>

    <!-- Modal Header -->
    <h3 class="add-maincourse-modal-header">{{ MainCoursemodalHeader }}</h3>
    <hr>

    <form (ngSubmit)="createMainCourse()">
      <div class="row">
        <div class="col-md-8">
          <label for="MainCourse" style="font-weight: bold;">
            Main Course Name
          </label>
          <input class="form-control" type="text" id="MainCourse" placeholder="Enter Main Course Name" name="MainCourse"
            [(ngModel)]="newCourse.MainCourse" />
        </div>

        <div class="col-md-4 d-flex align-items-end mt-3">
          <button class="create-btn" style="background-color: #218838; color: white; border: none; padding: 6px 12px; border-radius: 5px; 
            cursor: pointer; font-size: 14px; transition: background-color 0.3s ease;">
            Save
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
