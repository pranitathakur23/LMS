<div class="big-card mt-4">
  <div class="container">
    <button class="create-btn" (click)="openModal()" style="    background-color: #218838;
    color: white;
    border: none;">
      <span class="icon">+</span>Create Course
    </button>

    <div class="card mt-4">
      <table class="table table-hover table-striped custom-table" style="margin-bottom: 0%;">
           <thead>
          <tr>
            <th>SR. No</th>
            <th>Course Name</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <!-- If no courses are available, show the "Data Not Available" message -->
          <tr *ngIf="courses.length === 0" class="animate__animated animate__fadeIn animate__delay-1s">
            <td colspan="4" style="text-align: center; font-weight: bold; color: #999;">Data Not Available</td>
          </tr>
        
          <!-- Loop through the courses and display them -->
          <tr *ngFor="let course of courses; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ course.name }}</td>
          
            <td>
              <button  class="btn btn-warning btn-sm mr-2"  (click)="editCourse(course)" style=" background-color: #198754;
              color: white;
              border-color: #198754;">
                <i class="fas fa-edit"></i>
              </button>
              <button class="btn btn-info btn-sm mr-2" (click)="mapCourse()" style="background-color: #0dcaf0; border-color: #0dcaf0;">
                <i class="fas fa-exchange-alt"></i> <!-- Mapping icon -->
              </button>
              <button class="btn btn-danger btn-sm mr-2" (click)="deleteCourse(course)" style=" background-color: #dc3545;
  border-color: #dc35">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Main Course Modal -->
    <div *ngIf="isModalOpen" class="modal">
      <div class=" modal-content">
      <button class="close-btn" (click)="closeModal()">&times;</button>

    <!-- Modal Header -->
    <h3 class="modal-header">{{ modalHeader }}</h3>
        <form (ngSubmit)="submitForm()">
          <!-- Course Form Fields -->
          <div class="row">
            <div class="col-md-6">
              <label for="courseTitle" style="font-weight: bold;">
                Course Title
              </label>
              <input
              class="form-control"
              type="text"
              id="courseTitle"
              [(ngModel)]="newCourse.title"
              placeholder="Enter Course Title"
              name="courseTitle"
              required
              #courseTitleInput
            />
            </div>
            <div class="col-md-6">
              <label for="department" style="font-weight: bold;">
                Department
              </label>
              <select
  class="form-control"
  id="department"
  [(ngModel)]="newCourse.department"
  name="department"
  required
  #departmentSelect
>
  <option value="" disabled selected>Select Department</option>
  <option *ngFor="let dept of departments" [value]="dept.DepartmentID">
    {{ dept.DepartmentName }}
  </option>
</select>
            
            </div>
          </div>
        
          <div class="row">
            <div class="col-md-6">
              <label for="durationTime" style="font-weight: bold;">
                Course Duration In
              </label>
              <select
  class="form-control"
  id="durationTime"
  [(ngModel)]="newCourse.durationTime"
  name="durationTime"
  required
  #durationTimeSelect
>
  <option value="" disabled selected>Select Course Duration</option>
  <option *ngFor="let time of durationTimes" [value]="time.DurationID">
    {{ time.DurationName }}
  </option>
</select>
            </div>
            <div class="col-md-6">
              <label for="duration" style="font-weight: bold;">
                Course Duration
              </label>
              <input
              class="form-control"
              type="text"
              id="duration"
              [(ngModel)]="newCourse.duration"
              name="duration"
              placeholder="Enter Course Duration Time "
              required
              #durationInput
            />
            </div>
          </div>
        
          <div class="row mt-3">
            <div class="col-md-6">
              <label for="fileUpload" style="font-weight: bold;">
                Thumbnail
              </label>
              <div class="custom-file">
                <input
                  type="file"
                  class="form-control"
                  id="fileUpload"
                  (change)="handleFileUpload($event)"
                  accept="image/*"
                  #fileUploadInput
                />
              </div>
              <div *ngIf="thumbnailPreview" class="mt-2">
                <label for="thumbnailPreview" style="font-weight: bold;">Thumbnail Preview</label>
              </div>
            </div>
            <div class="col-md-6">
              <label for="description" style="font-weight: bold;">
                Description
              </label>
             <textarea
  class="form-control"
  id="description"
  name="description"
  rows="4"
  [(ngModel)]="newCourse.description"
  required
  #descriptionTextarea
></textarea>
            </div>
          </div>
        
          <div class="row mt-3">
            <div class="col-md-12">
              <button
                class="create-btn"
                style="background-color: #218838; color: white; border: none; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; color: white; transition: background-color 0.3s ease;"
              >
                Submit
              </button>
            </div>
          </div>
        </form>
        
      </div>
    </div>
  </div>
</div>
