<div class="container" style="margin-top: 6%;">
  <div class="row">
    <div class="col-md-12">
      <div class="d-flex justify-content-between align-items-center">
        <h3 class="mb-0" style="font-weight: bold;"> Main Course Details</h3>
      </div>

      <!-- Input Form -->
      <div class="row">
        <div class="col-md-6 form-group mt-3">
          <label for="mainCourseInput" style="font-weight: bold;">Main Course Name</label>
         <input
  type="text"
  id="mainCourseInput"
  class="form-control"
  placeholder="Enter Main Course Name"
  name="mainCourseInput"
  [(ngModel)]="newCourse.MainCourse"
/>
        </div>

        <div class="col-md-6 mt-5">
         <button class="btn btn-success" (click)="saveMainCourse()">
  {{ isEditMode ? 'Update Main Course' : 'Add Main Course' }}
</button>

         
        </div>
      </div>

      <!-- Main Course List Table -->
      <div class="table-wrapper mt-4" style="max-height: 400px; overflow-y: auto; border: 1px solid #dee2e6;">
        <table class="table table-hover table-striped custom-table text-center align-middle">
          <thead>
            <tr>
              <th class="text-center">SR No</th>
              <th class="text-start">Main Course Name</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody>
            <tr
              *ngFor="let course of Maincourses"
  (click)="onRowClick($event, course.CourseID)"
              style="cursor: pointer;"
            >
              <td class="text-center">{{ course.SrNo }}</td>
              <td class="text-start">{{ course.CourseName }}</td>

              <td>
           <button
  class="btn btn-success btn-sm"
  (click)="editCourse(course)"
  style="color: white;"
>
  <i class="fas fa-edit"></i>
</button>
              </td>

              <td>
                <button
                  class="btn btn-danger btn-sm"
                  (click)="deleteCourse(course)"
                >
                  <i class="fas fa-trash-alt"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
