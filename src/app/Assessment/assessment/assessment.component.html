<div class="container" style="margin-top: 7%;">
  <div class="row">
    <div class="col-md-12">
      <!-- Top Header Section -->
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
        <button class="btn btn-warning mb-2" (click)="goBack()" style="color: white;">
          <i class="fas fa-arrow-left"></i>
        </button>
        <h3 class="mx-auto mb-2" style="font-weight: bold;">Assessment Details</h3>
        <button class="btn btn-success mb-2" (click)="openModal()">
          <i class="fas fa-plus-circle"></i> Add Assessment
        </button>
      </div>

      <!-- Scrollable Table Container -->
      <div class="table-wrapper">
        <table class="table table-hover table-striped custom-table text-center align-middle">
          <thead class="table-dark">
            <tr>
              <th style="min-width: 60px;">SR. No</th>
              <th style="min-width: 120px;">Course Name</th>
              <th style="min-width: 140px;">Assessment Name</th>
              <th style="min-width: 100px;">Duration</th>
              <th style="min-width: 60px;">Edit</th>
              <th style="min-width: 70px;">Delete</th>
              <th style="min-width: 90px;">Mapping</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngIf="assessment.length === 0">
              <td colspan="7" class="text-center">No data available</td>
            </tr>
            <tr *ngFor="let item of assessment">
              <td>{{ item.SrNo }}</td>
              <td>{{ item.CourseName }}</td>
              <td>{{ item.name }}</td>
              <td>{{ item.duration }}</td>
              <td>
                <button class="btn btn-success btn-sm" (click)="editAssessment(item.assessmentID)">
                  <i class="fa fa-edit"></i>
                </button>
              </td>
              <td>
                <button class="btn btn-danger btn-sm" (click)="deleteAssessment(item.assessmentID, item.name)">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
              <td>
                <button class="btn btn-info btn-sm" [disabled]="item.CourseID == 0" (click)="SaveAssessmentAllocation(item.CourseID, item.assessmentID)">
                  <i class="fas fa-exchange-alt"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>



    <!-- Main Course Modal -->
    <div *ngIf="isModalOpen" class="modal">
      <div class="modal-content">
        <button class="close-btn" (click)="closeModal()">&times;</button>
        <h3 class="modal-header">{{ modalHeaderText }}</h3>
        <form>
                <!-- Row for Radio Buttons: Course or Assessment -->
                <div class="row">
                  <div class="col-md-6" style="display: flex; align-items: center;">
                    <input type="radio" id="courseRadio" name="type" value="course" (change)="setSelection('course')" [checked]="selectedType === 'course'" />
                    <label for="courseRadio" [ngClass]="{ 'selected-radio': selectedType === 'course' }" style="margin-left: 10px; margin-top: 5px;">Course</label>
                  </div>
                  <div class="col-md-6" style="display: flex; align-items: center;">
                    <input type="radio" id="generalRadio" name="type" value="general" (change)="setSelection('general')" [checked]="selectedType === 'general'" />
                    <label for="generalRadio" [ngClass]="{ 'selected-radio': selectedType === 'general' }" style="margin-left: 10px; margin-top: 5px;">General</label>
                  </div>
                </div>
          <!-- Course Form Fields -->
          <div class="row mt-2">
            <div class="col-md-6">
              <label for="department" style="font-weight: bold;">Course</label>
              <select class="form-control" id="department" [(ngModel)]="selectedCourseId" name="department" required #courseSelect [disabled]="isCourseDisabled">
                <option [value]="null" disabled>Select Course</option>
                <option *ngFor="let course of courses" [value]="course.courseId">{{ course.name }}</option>
              </select>
            </div>      
            <div class="col-md-6">
              <label for="courseTitle" style="font-weight: bold;">Assessment Name</label>
              <input class="form-control" type="text" id="courseTitle" [(ngModel)]="assessmentName" name="courseTitle" placeholder="Enter Assessment Name" required #assessmentNameInput />
            </div>
          </div>
          <div class="row mt-2">
            <div class="col-md-4">
              <label for="questionPaper" style="font-weight: bold;">Question Paper</label>
              <select class="form-control" id="questionPaper" [(ngModel)]="selectedQuestionPaper" name="questionPaper" required #questionPaperSelect>
                <option [value]="null" disabled selected>Select Question Papers</option>
                <option *ngFor="let paper of questionPapers" [value]="paper">
                  {{ paper }}
                </option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="durationTime" style="font-weight: bold;"> Duration In</label>
              <select class="form-control" id="durationTime" [(ngModel)]="newCourse.durationTime" name="durationTime" required #durationTimeSelect>
                <option [value]="null" disabled selected>Select Course Duration</option>
                <option *ngFor="let time of durationTimes" [value]="time.DurationID">{{ time.DurationName }}</option>
              </select>
            </div>
            <div class="col-md-4">
              <label for="chapterDuration" style="font-weight: bold;">Duration</label>
              <input class="form-control" type="text" id="chapterDuration" [(ngModel)]="durationValue" name="chapterDuration" placeholder="Enter Duration" required (input)="validateNumberInput($event)"  #durationInput />
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <label for="questionsCount" style="font-weight: bold;">Number Of Questions</label>
              <input class="form-control" type="text" id="questionsCount" [(ngModel)]="questionsCount" name="questionsCount" placeholder="Enter no of Questions" required (input)="validateNumberInput($event)" #questionsCountInput />
            </div>
            <div class="col-md-6">
              <label for="totalMarks" style="font-weight: bold;">Total Marks</label>
              <input class="form-control" type="text" id="totalMarks" [(ngModel)]="totalMarks" name="totalMarks" placeholder="Enter total Marks" required (input)="validateNumberInput($event)" #totalMarksInput />
            </div>
          </div>
          <div class="row">
            <div class="col-md-6">
              <label for="passingMarks" style="font-weight: bold;">Passing Marks</label>
              <input class="form-control" type="text" id="passingMarks" [(ngModel)]="passingMarks" name="passingMarks" placeholder="Enter Passing Marks" required (input)="validateNumberInput($event)" #passingMarksInput />
            </div>
            <div class="col-md-6">
              <label for="passingMarks" style="font-weight: bold;">Number Of Attempts</label>
              <input class="form-control" type="text" id="noOfAttempts" [(ngModel)]="noOfAttempts" name="noOfAttempts" placeholder="Enter No of Attempts" required (input)="validateNumberInput($event)" #noOfAttemptsInput />
            </div>
          </div>
          <div class="row mt-3">
            <div class="col-md-12">
              <button class="submit-btn" (click)="SaveandUpdateAssessmentDetails()">Submit</button>
            </div>
          </div>
        </form>
      </div>
    </div>
